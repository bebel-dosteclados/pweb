<!DOCTYPE html>
<html lang="pt-br>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes e cores</title>

    <style type="text/css">
        .fonteSerif {
            font-family: "Times New Roman", "Georgia",serif;
            font-size: 80px;
        }
        .fonteSans-serif {
            font-family: "Verdana",Arial,Helvetica,sans-serif;
            font-size: 40px;
        }
        .fonteMonospace {
            font-family: "Courier New",monospace;
            font-size: 20px;
        }

    </style>
</head>
<body>
    <div class=conteudo>
        <p class="fonteSerif">Programação Web </p>
        <p class="fonteSans-serif">Programação Web</p>
        <p class="fonteMonospace">Programação Web</p>
    </div>
    
</body>
</html>
