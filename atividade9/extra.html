<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Document</title>
</head>

    <style>
        body{
            margin:0;
            font-family: Arial, sans-serif;
        }

        .header{
            width:100%;
            height:60px;
            background-color:lightblue;
            text-align:center;
            line-height:60px;

            position:fixed;
            top:0;
            left:0;
        }

        .container{
            display:flex;
            margin-top:60px;
            height:500px;
        }

        .left{
            width:25%;
            background-color:lightcoral;
            text-align:center;
            line-height:500px;
        }

        .center{
            width:50%;
            background-color:lightgreen;
            text-align:center;
            line-height:500px;
        }

        .right{
            width:25%;
            background-color:lightcoral;
            text-align:center;
            line-height:500px;
        }

        .footer{
            width:100%;
            height:50px;
            background-color:lightpink;
            text-align:center;
            line-height:50px;
        }
    </style>

</head>

<body>

    <div class="header">
        Header 100%
    </div>

    <div class="container">
        <div class="left">
            Left 25%
        </div>

        <div class="center">
            Center 50%
        </div>

        <div class="right">
            Right 25%
        </div>
    </div>

    <div class="footer">
        Footer 100%
    </div>

</body>
</html>
</style>
