<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Model</title>
</head>
<style type="text/css">

      body{
            background: #09ff00
        }

#conteudo{
    background-color:white;
    padding: 10px;
    width:900px;
    margin:30px auto;
}

.caixa{
    background-color: red;
    width:100px;
    height:100px;
    margin:10px;
    color:#FFFFFF;

}

#relativo{
    position:relative;
    left: 30px;
}

#absoluto{
    position:absolute;
    left:30px;
}

#fixo{
    position:fixed;
    left:200px;
    top: 0px;
}
</style>
<body>

    <span>Container body</span>

<div id="conteudo">
    Conteúdo

    <div id="relativo" class="caixa">
        Relativo
    </div>

     <div id="absoluto" class="caixa">
        Absoluto
    </div>

     <div id="fixo" class="caixa">
        Fixo
    </div>

</div>
    
</body>
</html>
