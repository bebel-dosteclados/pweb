<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>rosa e isabela</title>
</head>
<body>
    <h1>Cadastro</h1>

    <form action="https://qfgdkj.hospedagemelastica.com.br/pweb/salvar.jsp" method="GET">
        Login : <br>
        <input type="text" required name="login"><br>

        Senha : <br>
        <input type="password" name="senha"><br>
        Confirmar senha : <br>
        <input type="password" name="confirmarsenha"><br>
        
        Nome : <br>
        <input type="text" name="nome"><br>

        Sexo : <br>
        <input type="radio" value="Masculino" name="sexo">Masculino<br>
        <input type="radio" value="Feminino" name="sexo">Feminino<br>

        Email : <br>
        <input type="email" name="email"><br><br>

        Interesses : <br>
        <input type="checkbox" value="Futebol" name="interesses">Futebol<br>
        <input type="checkbox" value="Politica" name="interesses">Política<br>
        <input type="checkbox" value="Economia" name="interesses">Economia<br>
        <input type="checkbox" value="Carros" name="interesses">Carros<br>
        <input type="checkbox" value="Celebridades" name="interesses">Celebridades<br><br>

        <label for="estado">Estado:</label>
        <select name="estado" id="estado">
        <option value="piaui">Piauí</option>
        <option value="maranhao">Maranhão</option>
        <option value="ceara">Céara</option>
        <option value="tocantins">Tocantins</option>
        </select>
        <br><br>

        <p><label for="observações">Observações:</label></p>
        <textarea id="observações" name="observações" rows="4" cols="50"></textarea>
        <br>

        <input type="submit" value="Enviar">

    </form>
